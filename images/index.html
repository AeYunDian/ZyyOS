<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <!-- 保持与 index.html 一致的头部信息 -->
    <link rel="icon" href="/favicon.png" sizes="any">
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
    <link rel="icon" type="image/x-icon" href="/favicon.ico">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>访问受限 - Zyy Maple Leaf OS</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-color: #D97706;
            --primary-hover: #B45309;
            --secondary-color: #F59E0B;
            --text-primary: #F3F4F6;
            --text-secondary: #78350F;
            --bg-card: rgba(255, 255, 255, 0.55);
            --border-color: rgba(255, 255, 255, 0.6);
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            --undz-accent: #6a11cb;
            --text-light: #92400E;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(-45deg, #FEF3C7, #FDE68A, #FDBA74, #F59E0B, #D97706);
            background-size: 400% 400%;
            animation: gradientFlow 15s ease infinite;
            min-height: 100vh;
            font-family: 'Noto Sans SC', sans-serif;
            color: #451a03;
            line-height: 1.8;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .navbar {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            z-index: 1000;
            display: flex;
            justify-content: center;
            padding: 15px 0;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.1);
        }

        .nav-links {
            display: flex;
            gap: 40px;
        }

        .nav-btn {
            color: #FEF3C7;
            text-decoration: none;
            font-size: 1.1em;
            font-weight: 500;
            padding: 10px 20px;
            border-radius: 8px;
            transition: var(--transition);
            position: relative;
        }

        .nav-btn:hover {
            transform: translateY(-3px) scale(1.05);
            background: rgba(0, 0, 0, 0.2);
            color: #fff;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            gap: 20px;
            padding: 100px 20px 20px;
            flex: 1;
            align-items: center;
            justify-content: center;
            text-align: center;
        }

        .status-icon {
            font-size: 5em;
            color: var(--primary-color);
            margin-bottom: 20px;
            opacity: 0;
            animation: fadeInUp 0.8s ease-out forwards;
        }

        .main-title {
            font-size: 3em;
            background: linear-gradient(to right, #B45309, #78350F);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 20px;
            font-weight: 800;
            opacity: 0;
            animation: fadeInUp 0.8s ease-out 0.2s forwards;
        }

        .description {
            font-size: 1.2em;
            color: #78350F;
            max-width: 600px;
            margin-bottom: 30px;
            font-weight: 500;
            opacity: 0;
            animation: fadeInUp 0.8s ease-out 0.4s forwards;
        }

        .info-card {
            background: var(--bg-card);
            padding: 30px;
            border-radius: 16px;
            border: 1px solid rgba(255, 255, 255, 0.6);
            box-shadow: 0 10px 30px rgba(217, 119, 6, 0.15);
            backdrop-filter: blur(10px);
            width: 100%;
            max-width: 500px;
            text-align: left;
            opacity: 0;
            transform: translateY(20px);
            animation: slideInUp 0.6s ease-out 0.6s forwards;
        }

        .info-item {
            display: flex;
            margin-bottom: 15px;
            padding-bottom: 15px;
            border-bottom: 1px dashed rgba(255, 165, 0, 0.3);
        }

        .info-label {
            font-weight: 700;
            color: #78350F;
            min-width: 100px;
        }

        .info-value {
            color: #92400E;
            font-weight: 500;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            padding: 16px 45px;
            background: linear-gradient(135deg, #F59E0B 0%, #D97706 100%);
            color: white;
            text-decoration: none;
            border-radius: 12px;
            font-weight: 700;
            font-size: 1.2em;
            letter-spacing: 0.5px;
            box-shadow: 0 6px 0 #B45309, 0 15px 30px rgba(217, 119, 6, 0.3);
            transition: var(--transition);
            border: none;
            cursor: pointer;
        }

        .btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 9px 0 #B45309, 0 20px 40px rgba(217, 119, 6, 0.4);
        }

        @keyframes gradientFlow {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes slideInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @media (max-width: 768px) {
            .main-title {
                font-size: 2.2em;
            }
            .description {
                font-size: 1em;
            }
        }

        html {
    overflow: auto !important;
    scroll-behavior: smooth;
}
    </style>
</head>
<body>

            <a href="/#directory" class="nav-btn">

    <!-- 主体内容 -->
    <div class="container">
        <div class="status-icon">
            <svg xmlns="http://www.w3.org/2000/svg" width="1em" height="1em" viewBox="0 0 576 512"><path fill="currentColor" d="M0 96C0 60.7 28.7 32 64 32H448c35.3 0 64 28.7 64 64V416c0 35.3-28.7 64-64 64H64c-35.3 0-64-28.7-64-64V96zM323.8 202.5c-4.5-6.6-11.9-10.5-19.8-10.5s-15.4 3.9-19.8 10.5l-87 127.6L170.7 297c-4.6-5.7-11.5-9-18.7-9s-14.2 3.3-18.7 9l-64 80c-5.8 7.2-6.9 17.1-2.9 25.4s12.4 13.6 21.6 13.6h96 32H424c8.9 0 17.1-4.9 21.2-12.8s3.6-17.4-1.4-24.7l-120-176zM112 192a48 48 0 1 0 0-96 48 48 0 1 0 0 96z"></path></svg>

        <h1 class="main-title">图像资源目录</h1>

        <p class="description">
            这里存放着 Zyy Maple Leaf OS 官网运行所需的核心图像文件。
        </p>

        <!-- 信息卡片 -->
        <div class="info-card">
            <div class="info-item">
                <div class="info-label">状态:</div>
                <div class="info-value">访问受限 (Forbidden)</div>
            </div>
            <div class="info-item">

            </div>
        </div>

    <footer style="margin-top: auto; padding: 20px; text-align: center; color: #92400E; font-size: 0.9em; width: 100%;">

</html>
