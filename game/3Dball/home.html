<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>游戏</title>
  <script>
    (function() {
      try {
        var currentUrl = window.location.href;
        if (currentUrl.endsWith('/') && !currentUrl.endsWith('//')) {
          var pathArray = currentUrl.split('/');
          if (pathArray.length <= 4) {
            return;
          }
        }

        var url = new URL(currentUrl);
        var pathname = url.pathname;

        if (pathname !== '/') {
          var newPath = pathname.substring(0, pathname.lastIndexOf('/', pathname.length - 2));
          if (newPath !== '/' && newPath !== '') {
            newPath = newPath.substring(0, newPath.lastIndexOf('/', newPath.length - 2));
          }
          
          if (newPath === '') {
            newPath = '/';
          }

          var newUrl = url.origin + newPath;
          window.location.replace(newUrl);
        }
      } catch (e) {
        console.error('跳转失败:', e);
        var currentPath = window.location.pathname;
        if (currentPath !== '/') {
          var parentPath = currentPath.substring(0, currentPath.lastIndexOf('/', currentPath.length - 2));
          if (parentPath !== '/' && parentPath !== '') {
            parentPath = parentPath.substring(0, parentPath.lastIndexOf('/', parentPath.length - 2));
          }
          if (parentPath === '') parentPath = '/';
          window.location.replace(window.location.origin + parentPath);
        }
      }
    })();
  </script>
</head>
<body>
</body>
</html>
