<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>游戏</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #050505;
            color: #fff;
        }

        h1 {
            position: absolute;
            top: 10%;
            font-weight: 300;
            letter-spacing: 2px;
            color: #a0a0b0;
            margin: 0;
            font-size: 1.5rem;
        }

        .btn-cyber {
            position: relative;
            display: inline-block;
            padding: 15px 30px;
            color: #03e9f4;
            text-decoration: none;
            font-size: 24px;
            letter-spacing: 4px;
            transition: 0.5s;
            overflow: hidden;
            border: 2px solid #03e9f4;
            background: rgba(3, 233, 244, 0.05);
            font-family: 'Courier New', Courier, monospace;
            cursor: pointer;
        }

        .btn-cyber:hover {
            background: #03e9f4;
            color: #050505;
            box-shadow: 0 0 5px #03e9f4,
                        0 0 25px #03e9f4,
                        0 0 50px #03e9f4,
                        0 0 200px #03e9f4;
        }
    </style>
</head>
<body>

    <h1>请选择游戏</h1>
    <a href="./3Dball/" class="btn-cyber">
        3Dball
    </a>

</body>
</html>
