<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZYY-Office个人简介</title>
    <link href="//fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary-color: #D97706;
            --primary-hover: #B45309;
            --secondary-color: #F59E0B;
            --text-primary: #F3F4F6;
            --text-secondary: #78350F;
            --bg-card: rgba(255, 255, 255, 0.55);
            --border-color: rgba(255, 255, 255, 0.6);
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            --undz-accent: #6a11cb;
            --text-light: #92400E;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background: linear-gradient(-45deg, #FEF3C7, #FDE68A, #FDBA74, #F59E0B, #D97706);
            background-size: 400% 400%;
            animation: gradientFlow 15s ease infinite;
            min-height: 100vh;
            font-family: 'Noto Sans SC', sans-serif;
            color: #451a03;
            line-height: 1.8;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        @keyframes gradientFlow {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .navbar {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            z-index: 1000;
            display: flex;
            justify-content: center;
            padding: 15px 0;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.1);
        }

        .nav-links {
            display: flex;
            gap: 40px;
        }

        .nav-btn {
            color: #FEF3C7;
            text-decoration: none;
            font-size: 1.1em;
            font-weight: 500;
            padding: 10px 20px;
            border-radius: 8px;
            transition: var(--transition);
            position: relative;
        }

        .nav-btn:hover {
            transform: translateY(-3px) scale(1.05);
            background: rgba(0, 0, 0, 0.2);
            color: #fff;
        }

        .card {
            position: relative;
            z-index: 1;
            background: var(--bg-card);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid var(--border-color);
            border-radius: 20px;
            padding: 40px;
            width: 360px;
            text-align: center;
            color: #451a03;
            box-shadow: 0 10px 30px rgba(217, 119, 6, 0.3);
            opacity: 0;
            transform: translateY(30px);
            animation: fadeInUp 0.8s ease-out forwards;
        }

        .avatar {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            border: 3px solid rgba(255, 255, 255, 0.8);
            object-fit: cover;
            margin: 0 auto 25px;
            box-shadow: 0 8px 20px rgba(217, 119, 6, 0.3);
            transition: transform 0.3s ease;
        }

        .avatar:hover {
            transform: scale(1.08) rotate(5deg);
        }

        h1 {
            font-size: 28px;
            font-weight: 800;
            margin-bottom: 10px;
            letter-spacing: 1px;
            background: linear-gradient(to right, var(--primary-color), var(--text-secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        p.bio {
            font-size: 15px;
            color: var(--text-secondary);
            margin-bottom: 30px;
            font-weight: 500;
        }

        .social-links {
            display: flex;
            justify-content: center;
            gap: 25px;
        }

        .social-btn {
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
            width: 50px;
            height: 50px;
            background: rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            color: #fff;
            text-decoration: none;
            font-size: 22px;
            transition: var(--transition);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .social-btn:hover {
            background: #fff;
            transform: translateY(-5px) scale(1.1);
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
        }

        .social-btn.bilibili:hover { color: #fb7299; }
        .social-btn.github:hover { color: #333; }
        .social-btn.qq:hover { color: #12b7f5; }

        .social-btn::after {
            content: attr(title);
            position: absolute;
            bottom: 120%;
            left: 50%;
            transform: translateX(-50%) translateY(10px);
            background-color: rgba(0, 0, 0, 0.8);
            color: #fff;
            padding: 6px 12px;
            border-radius: 6px;
            font-size: 12px;
            white-space: nowrap;
            pointer-events: none;
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        .social-btn::before {
            content: '';
            position: absolute;
            bottom: 110%;
            left: 50%;
            transform: translateX(-50%) translateY(10px);
            border-width: 6px;
            border-style: solid;
            border-color: rgba(0, 0, 0, 0.8) transparent transparent transparent;
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s ease;
        }

        .social-btn:hover::after,
        .social-btn:hover::before {
            opacity: 1;
            visibility: visible;
            transform: translateX(-50%) translateY(0);
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @media (max-width: 480px) {
            .card {
                width: 90%;
                padding: 30px 20px;
            }
            h1 { font-size: 24px; }
        }
    </style>
</head>
<body>

    <nav class="navbar">
        <div class="nav-links">
            <a href="/" class="nav-btn">
                <svg xmlns="http://www.w3.org/2000/svg" width="1.13em" height="1em" viewBox="0 0 576 512"><path fill="currentColor" d="M575.8 255.5c0 18-15 32.1-32 32.1h-32l.7 160.2c0 2.7-.2 5.4-.5 8.1v16.2c0 22.1-17.9 40-40 40h-16c-1.1 0-2.2 0-3.3-.1c-1.4.1-2.8.1-4.2.1L416 512h-24c-22.1 0-40-17.9-40-40v-88c0-17.7-14.3-32-32-32h-64c-17.7 0-32 14.3-32 32v88c0 22.1-17.9 40-40 40h-55.9c-1.5 0-3-.1-4.5-.2c-1.2.1-2.4.2-3.6.2h-16c-22.1 0-40-17.9-40-40V360c0-.9 0-1.9.1-2.8v-69.7h-32c-18 0-32-14-32-32.1c0-9 3-17 10-24L266.4 8c7-7 15-8 21-8s15 2 21 7l255.4 224.5c8 7 12 15 11 24"></path></svg>
                主页
            </a>
            <a href="/#directory" class="nav-btn">
                <svg xmlns="http://www.w3.org/2000/svg" width="1em" height="1em" viewBox="0 0 448 512"><path fill="currentColor" d="M96 0C43 0 0 43 0 96v320c0 53 43 96 96 96h320c17.7 0 32-14.3 32-32s-14.3-32-32-32v-64c17.7 0 32-14.3 32-32V32c0-17.7-14.3-32-32-32zm0 384h256v64H96c-17.7 0-32-14.3-32-32s14.3-32 32-32m32-240c0-8.8 7.2-16 16-16h192c8.8 0 16 7.2 16 16s-7.2 16-16 16H144c-8.8 0-16-7.2-16-16m16 48h192c8.8 0 16 7.2 16 16s-7.2 16-16 16H144c-8.8 0-16-7.2-16-16s7.2-16 16-16"></path></svg>
                目录
            </a>
        </div>
    </nav>

    <div class="card">
        <a href="https://space.bilibili.com/1056203124"><img src="/images/pure_experience.png" alt="ZYY-Office" class="avatar"></a>
        <h1>ZYY-Office</h1>
        <p class="bio">Zyy Maple Leaf OS系统开发者，喜欢编程，还有我的世界Minecraft。</p>
        <div class="social-links">
            <a href="https://space.bilibili.com/1056203124" class="social-btn bilibili" title="Bilibili">
                <i class="fa-brands fa-bilibili"></i>
            </a>
            <a href="https://github.com/ZyyOS" class="social-btn github" title="GitHub">
                <i class="fa-brands fa-github"></i>
            </a>
            <a href="https://api.undz.cn/addqq?uid=3918080979" class="social-btn qq" title="QQ">
                <i class="fa-brands fa-qq"></i>
            </a>
        </div>
    </div>

</body>
</html>
