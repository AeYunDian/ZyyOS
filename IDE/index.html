
<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>在线代码编辑器</title>
	<link rel="icon" href="https://user-assets.sxlcdn.com/images/1209238/FlWuslNmGTHt1EipxUtq2GI6zqnN.png?imageMogr2/strip/auto-orient/thumbnail/1200x9000%3E/quality/90!/format/png" type="image/png">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/4.0.2/marked.min.js"></script>
    <style>
        :root {
            --bg-dark: #1a1a1a;
            --accent: #00ff88;
            --text: #e0e0e0;
            --toolbar-bg: #2d2d2d;
            --footer-bg: #2d2d2d;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Fira Code', monospace;
            background: var(--bg-dark);
            color: var(--text);
            display: flex;
            height: 100vh;
            flex-direction: column;
            transition: background 0.3s, color 0.3s;
        }

        .toolbar {
            background: var(--toolbar-bg);
            padding: 0.8rem;
            display: flex;
            gap: 1rem;
            border-bottom: 1px solid #333;
        }

        .btn {
            background: #363636;
            color: var(--text);
            border: none;
            padding: 8px 16px;
            border-radius: 4px;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .btn:hover:not(#languageSelect) {
            background: var(--accent);
            color: #1a1a1a;
        }

        #languageSelect:hover {
            background: #404040;
        }

        .editor-container {
            display: flex;
            flex: 1;
            width: 100%;
        }

        #editor {
            width: 100%;
            height: 100%;
            transition: width 0.3s;
        }

        .preview {
            display: none;
            width: 50%;
            padding: 20px;
            overflow-y: auto;
            border-left: 1px solid #333;
            line-height: 1.6;
        }

        .markdown-mode .preview {
            display: block;
        }

        .markdown-mode #editor {
            width: 50%;
        }

        .preview h1, .preview h2, .preview h3 {
            color: var(--text);
            border-bottom: 1px solid #444;
            padding-bottom: 0.3em;
        }

        .preview code {
            background: #363636;
            padding: 2px 4px;
            border-radius: 4px;
        }

        .preview pre {
            background: #363636;
            padding: 10px;
            border-radius: 4px;
            overflow-x: auto;
        }

        .preview blockquote {
            border-left: 4px solid #666;
            padding-left: 1em;
            margin-left: 0;
            color: #888;
        }

        .theme-icon {
            transition: transform 0.3s ease;
        }
    </style>
</head>
<body>
    <div class="toolbar">
        <button class="btn">
            <a href="/">
                <svg xmlns="http://www.w3.org/2000/svg" width="1.13em" height="1em" viewBox="0 0 576 512"><path fill="currentColor" d="M575.8 255.5c0 18-15 32.1-32 32.1h-32l.7 160.2c0 2.7-.2 5.4-.5 8.1v16.2c0 22.1-17.9 40-40 40h-16c-1.1 0-2.2 0-3.3-.1c-1.4.1-2.8.1-4.2.1L416 512h-24c-22.1 0-40-17.9-40-40v-88c0-17.7-14.3-32-32-32h-64c-17.7 0-32 14.3-32 32v88c0 22.1-17.9 40-40 40h-55.9c-1.5 0-3-.1-4.5-.2c-1.2.1-2.4.2-3.6.2h-16c-22.1 0-40-17.9-40-40V360c0-.9 0-1.9.1-2.8v-69.7h-32c-18 0-32-14-32-32.1c0-9 3-17 10-24L266.4 8c7-7 15-8 22-8s15 2 21 7l255.4 224.5c8 7 12 15 11 24"></path></svg>
            </a>
        </button>
        <button class="btn">
            <a href="/#directory">
                <svg xmlns="http://www.w3.org/2000/svg" width="1em" height="1em" viewBox="0 0 448 512"><path fill="currentColor" d="M96 0C43 0 0 43 0 96v320c0 53 43 96 96 96h320c17.7 0 32-14.3 32-32s-14.3-32-32-32v-64c17.7 0 32-14.3 32-32V32c0-17.7-14.3-32-32-32zm0 384h256v64H96c-17.7 0-32-14.3-32-32s14.3-32 32-32m32-240c0-8.8 7.2-16 16-16h192c8.8 0 16 7.2 16 16s-7.2 16-16 16H144c-8.8 0-16-7.2-16-16m16 48h192c8.8 0 16 7.2 16 16s-7.2 16-16 16H144c-8.8 0-16-7.2-16-16s7.2-16 16-16"></path></svg>
            </a>
        </button>
        <button class="btn">
            <strong>在线代码编辑器</strong>
        </button>
        <select class="btn" id="languageSelect">
            <option value="cpp">C++</option>
            <option value="python">Python</option>
            <option value="html">HTML</option>
            <option value="javascript">JavaScript</option>
            <option value="markdown">Markdown</option>
        </select>
        <button class="btn" onclick="zoomIn()">
            <i class="fas fa-search-plus"></i>
        </button>
        <button class="btn" onclick="zoomOut()">
            <i class="fas fa-search-minus"></i>
        </button>
        <button class="btn" onclick="toggleTheme()">
            <i class="fas fa-moon theme-icon"></i>
        </button>
        <button class="btn" onclick="saveContent()">
            <i class="fas fa-save"></i>
        </button>
    </div>
    <div class="editor-container">
        <div id="editor"></div>
        <div id="preview" class="preview"></div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.36.1/min/vs/loader.min.js"></script>
    <script>
        let editor;
        let currentTheme = localStorage.getItem('editorTheme') || 'vs-dark';
        let fontSize = parseInt(localStorage.getItem('editorFontSize')) || 14;

        function updatePreview() {
            const markdownContent = editor.getValue();
            const htmlContent = marked.parse(markdownContent);
            document.getElementById('preview').innerHTML = htmlContent;
        }

        require.config({ paths: { vs: 'https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.36.1/min/vs' }});
        require(['vs/editor/editor.main'], function() {
            editor = monaco.editor.create(document.getElementById('editor'), {
                value: localStorage.getItem('savedCode') || '',
                language: 'cpp',
                theme: currentTheme,
                fontSize: fontSize,
                automaticLayout: true,
                minimap: { enabled: false }
            });

            document.getElementById('languageSelect').addEventListener('change', function() {
                const language = this.value;
                monaco.editor.setModelLanguage(editor.getModel(), language);
                const container = document.querySelector('.editor-container');

                if (language === 'markdown') {
                    container.classList.add('markdown-mode');
                    updatePreview();
                    editor.getModel().onDidChangeContent(updatePreview);
                } else {
                    container.classList.remove('markdown-mode');
                    editor.getModel().onDidChangeContent(null);
                }
                editor.layout();
            });
        });

        function updateFontSize() {
            editor.updateOptions({ fontSize: fontSize });
            localStorage.setItem('editorFontSize', fontSize);
        }

        function zoomIn() {
            if(fontSize < 24) {
                fontSize += 2;
                updateFontSize();
            }
        }

        function zoomOut() {
            if(fontSize > 10) {
                fontSize -= 2;
                updateFontSize();
            }
        }

        function toggleTheme() {
            const themeIcon = document.querySelector('.theme-icon');
            if(currentTheme === 'vs-dark') {
                currentTheme = 'vs';
                document.body.style.background = '#ffffff';
                document.body.style.color = '#1a1a1a';
                themeIcon.classList.replace('fa-moon', 'fa-sun');
            } else {
                currentTheme = 'vs-dark';
                document.body.style.background = '#1a1a1a';
                document.body.style.color = '#e0e0e0';
                themeIcon.classList.replace('fa-sun', 'fa-moon');
            }
            monaco.editor.setTheme(currentTheme);
            localStorage.setItem('editorTheme', currentTheme);
        }

        function saveContent() {
            localStorage.setItem('savedCode', editor.getValue());
            localStorage.setItem('selectedLanguage', document.getElementById('languageSelect').value);
            alert('内容已保存！');
        }

        window.addEventListener('load', () => {
            const savedLanguage = localStorage.getItem('selectedLanguage') || 'cpp';
            document.getElementById('languageSelect').value = savedLanguage;

            const container = document.querySelector('.editor-container');
            if (savedLanguage === 'markdown') {
                container.classList.add('markdown-mode');
                editor.getModel().onDidChangeContent(updatePreview);
                updatePreview();
            }

            if (currentTheme === 'vs') {
                document.body.style.background = '#ffffff';
                document.body.style.color = '#1a1a1a';
                document.querySelector('.theme-icon').classList.replace('fa-moon', 'fa-sun');
            } else {
                document.body.style.background = '#1a1a1a';
                document.body.style.color = '#e0e0e0';
                document.querySelector('.theme-icon').classList.replace('fa-sun', 'fa-moon');
            }
        });
    </script>
</body>
</html>
