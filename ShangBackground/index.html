<script>
    function openDonationPopup() {
        const popup = document.getElementById('donationPopup');
        const overlay = document.getElementById('popupOverlay');
        popup.style.display = 'block';
        overlay.style.display = 'block';
        setTimeout(() => {
            popup.classList.add('show');
            overlay.classList.add('show');
        }, 10);
        generateRandomId();
    }
    function closeDonationPopup() {
        const popup = document.getElementById('donationPopup');
        const overlay = document.getElementById('popupOverlay');
        popup.classList.remove('show');
        overlay.classList.remove('show');
        setTimeout(() => {
            popup.style.display = 'none';
            overlay.style.display = 'none';
        }, 300);
    }
    function generateRandomId() {
        const chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789';
        let result = '';
        for (let i = 0; i < 10; i++) {
            result += chars.charAt(Math.floor(Math.random() * chars.length));
        }
        document.getElementById('randomId').textContent = `您的唯一ID: ${result}`;
        return result;
    }

    async function submitDonation() {
        const name = document.getElementById('donorName').value.trim() || '匿名';
        const remark = document.getElementById('donorRemark').value.trim() || '无备注';
        const friend = document.getElementById('friendCheck').checked ? '1' : '0';
        const idElement = document.getElementById('randomId');
        const id = idElement.textContent.replace('您的唯一ID: ', '');
        const donationData = { username: name, id: id, data: remark, Friend: friend, timestamp: Date.now() };
        const submitBtn = document.getElementById('submitBtn');
        submitBtn.disabled = true;
        submitBtn.textContent = '提交中...';
        try {
            const BIN_ID = '698f1502d0ea881f40b76c11';
            const MASTER_KEY = '$2a$10$usS36BdO17gWRxIMd56gjOwrDWBlfrGdsPW1AFFhcp1TBUrbqFg4G';
            const API_URL = `https://api.jsonbin.io/v3/b/${BIN_ID}`;
            const getResponse = await fetch(API_URL, { headers: { 'X-Master-Key': MASTER_KEY } });
            if (!getResponse.ok) throw new Error(`获取数据失败: HTTP ${getResponse.status}`);
            const responseData = await getResponse.json();
            let existingData = responseData.record || (Array.isArray(responseData) ? responseData : []);
            if (!Array.isArray(existingData)) existingData = [];
            existingData.push(donationData);
            const putResponse = await fetch(API_URL, {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json', 'X-Master-Key': MASTER_KEY },
                body: JSON.stringify(existingData)
            });
            if (!putResponse.ok) throw new Error(`更新数据失败: HTTP ${putResponse.status}`);
            alert('感谢您的施舍！\n\n数据已成功提交服务器！');
            closeDonationPopup();
        } catch (error) {
            console.error('提交失败', error);
            alert(`提交失败: ${error.message}\n\n请稍后重试或联系管理员小小电子xxdz！`);
        } finally {
            submitBtn.disabled = false;
            submitBtn.textContent = '确认已施舍并提交信息';
        }
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'Escape') {
            const popup = document.getElementById('donationPopup');
            if (popup && popup.classList.contains('show')) {
                closeDonationPopup();
            }
        }
    });
    window.onload = function() {
        generateRandomId();
    };
</script>
